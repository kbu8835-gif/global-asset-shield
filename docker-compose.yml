services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: global_asset_shield
      POSTGRES_USER: gas_user
      POSTGRES_PASSWORD: gas_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gas_user -d global_asset_shield"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8010:8010"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
